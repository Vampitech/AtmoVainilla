name: Build Clean Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the release (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
      release_name:
        description: 'Release display name'
        required: true
        default: 'Switch Clean Package v1.0.0'
      zip_root:
        description: 'Carpeta raiz dentro del ZIP (ej: UPD). Dejar vacio si no aplica'
        required: false
        default: 'UPD'
      hekate_mode:
        description: 'How to handle hekate_ipl.ini'
        required: true
        type: choice
        options:
          - append
          - replace-file
          - skip
        default: append

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download AIO ZIP
        run: |
          curl -L -v -o NeXT.zip "https://hyrule.vampitech.net/updater/NeXT.zip"
          file NeXT.zip
          ls -lh NeXT.zip

      - name: Extract ZIP
        run: |
          mkdir -p extracted
          unzip -o NeXT.zip -d extracted/

      - name: Show extracted structure
        run: find extracted/ -type f | sort

      - name: Select and copy files
        shell: bash
        env:
          ZIP_ROOT: ${{ inputs.zip_root }}
        run: |
          mkdir -p output

          while IFS= read -r line || [ -n "$line" ]; do
            [[ "$line" =~ ^#.*$ || -z "$line" ]] && continue

            SRC="extracted/$line"

            if [[ -n "$ZIP_ROOT" && "$line" == "$ZIP_ROOT/"* ]]; then
              STRIPPED="${line#${ZIP_ROOT}/}"
            else
              STRIPPED="$line"
            fi

            DEST="output/$STRIPPED"

            if [ -e "$SRC" ]; then
              mkdir -p "$(dirname "$DEST")"

              if [ -d "$SRC" ]; then
                mkdir -p "$DEST"
                cp -a "$SRC"/. "$DEST"/
              else
                cp -a "$SRC" "$DEST"
              fi

              echo "Copied: $line -> $STRIPPED"
            else
              echo "WARNING: Not found: $SRC"
            fi
          done < package_files.txt

      - name: Apply exclusions
        shell: bash
        run: |
          if [ ! -f package_exclude.txt ]; then
            echo "No package_exclude.txt found, skipping exclusions."
            exit 0
          fi

          while IFS= read -r line || [ -n "$line" ]; do
            [[ "$line" =~ ^#.*$ || -z "$line" ]] && continue

            TARGET="output/$line"

            if [ -e "$TARGET" ]; then
              rm -rf "$TARGET"
              echo "Excluded: $line"
            else
              echo "WARNING: Exclude target not found: $TARGET"
            fi
          done < package_exclude.txt

      - name: Apply file operations
        shell: bash
        run: |
          if [ ! -f package_moves.txt ]; then
            echo "No package_moves.txt found, skipping file operations."
            exit 0
          fi

          while IFS='|' read -r action src dst || [ -n "$action" ]; do
            [[ "$action" =~ ^#.*$ || -z "$action" ]] && continue

            SRC="output/$src"
            DST="output/$dst"

            if [ ! -e "$SRC" ]; then
              echo "WARNING: Source not found: $SRC"
              continue
            fi

            mkdir -p "$(dirname "$DST")"

            case "$action" in
              copy)
                if [ -d "$SRC" ]; then
                  mkdir -p "$DST"
                  cp -a "$SRC"/. "$DST"/
                else
                  cp -a "$SRC" "$DST"
                fi
                echo "Copied: $src -> $dst"
                ;;
              move)
                mv "$SRC" "$DST"
                echo "Moved: $src -> $dst"
                ;;
              rename)
                PARENT="$(dirname "$SRC")"
                mv "$SRC" "$PARENT/$dst"
                echo "Renamed: $src -> $PARENT/$dst"
                ;;
              *)
                echo "WARNING: Unknown action: $action"
                ;;
            esac
          done < package_moves.txt

      - name: Patch hekate_ipl.ini
        if: ${{ inputs.hekate_mode != 'skip' }}
        shell: bash
        run: |
          mkdir -p output/bootloader

          if [ ! -f hekate_entries.ini ]; then
            echo "No hekate_entries.ini found, skipping hekate patch."
            exit 0
          fi

          TARGET="output/bootloader/hekate_ipl.ini"

          if [ "${{ inputs.hekate_mode }}" = "replace-file" ]; then
            cp hekate_entries.ini "$TARGET"
            echo "hekate_ipl.ini replaced."
          elif [ "${{ inputs.hekate_mode }}" = "append" ]; then
            touch "$TARGET"
            printf '\n' >> "$TARGET"
            cat hekate_entries.ini >> "$TARGET"
            printf '\n' >> "$TARGET"
            echo "hekate_ipl.ini appended."
          fi

          echo "--- Final hekate_ipl.ini ---"
          cat "$TARGET"

      - name: Show final output structure
        shell: bash
        run: |
          echo "--- Final output files ---"
          find output/ -type f | sort

      - name: Create output ZIP
        shell: bash
        run: |
          cd output
          zip -r ../switch-clean-package.zip .
          cd ..
          du -sh switch-clean-package.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.release_name }}
          body_path: RELEASE_NOTES.md
          files: switch-clean-package.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
